<!DOCTYPE html>
<html>
<head>
  <title>Video Gallery</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<h1>My Video Gallery</h1>

<div id="typeFilters" class="filters"></div>
<div class="search-bar">
  <input
    id="searchInput"
    type="text"
    placeholder="Search video, tag, category..."
    autocomplete="off"
  />
</div>
<div id="categoryFilters" class="filters"></div>

<div id="sortBar" class="sort-bar">
  <select id="sortSelect">
    <option value="newest">Newest</option>
    <option value="duration">Duration</option>
    <option value="title">Title (A-Z)</option>
  </select>
</div>
<div id="resultInfo" class="result-info"></div>
<div id="gallery"></div>

<div id="playerModal" class="hidden">
  <div class="player-content">
    <span class="player-close" onclick="closePlayer()">×</span>
    <div id="player"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="app.js?v=2"></script>
</body>
</html>
